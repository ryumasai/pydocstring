[package]
name = "pydocstring-python"
version = "0.1.12"
edition = "2024"
authors = ["Ryuma Asai"]
description = "Python bindings for pydocstring — a fast docstring parser for Google and NumPy styles"
license = "MIT"
publish = false

[lib]
name = "pydocstring"
crate-type = ["cdylib"]

[dependencies]
pydocstring_core = { package = "pydocstring", version = "0.1.12", path = "../.." }
pyo3 = { version = "0.24", features = ["extension-module"] }
