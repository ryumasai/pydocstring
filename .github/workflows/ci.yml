name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Install nightly rustfmt
        uses: dtolnay/rust-toolchain@nightly
        with:
          components: rustfmt

      - name: Set stable as default
        run: rustup default stable

      - name: Install just
        uses: extractions/setup-just@v4

      - name: Cache cargo
        uses: actions/cache@v6
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Check formatting
        run: just fmt-check

      - name: Clippy
        run: just lint

      - name: Docs (broken intra-doc links are errors)
        run: just doc

      - name: Build
        run: just build

      - name: Run tests
        run: just test

  # The README's MSRV badge has a job behind it: the crate must at least
  # *check* on rust-version from Cargo.toml, or the badge rots silently.
  msrv:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install Rust 1.88 (MSRV)
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.88"

      - name: Install just
        uses: extractions/setup-just@v4

      - name: Cache cargo
        uses: actions/cache@v6
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-msrv-${{ hashFiles('**/Cargo.lock') }}

      - name: Check on MSRV
        run: just msrv

  python-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      # rustdoc's JSON output is nightly-only, and the parity check reads it to
      # enumerate the Rust surface. Installing nightly makes it the default, so
      # put stable back — the extension itself must build on stable.
      - name: Install nightly (for rustdoc JSON)
        uses: dtolnay/rust-toolchain@nightly

      - name: Set stable as default
        run: rustup default stable

      - name: Cache cargo
        uses: actions/cache@v6
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-py-${{ hashFiles('**/Cargo.lock') }}

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Install just
        uses: extractions/setup-just@v4

      - name: Lint, type-check, and test
        run: just py-ci

      # Runs here rather than in `test`: it needs the built extension module,
      # which only this job has.
      - name: Rust↔Python API parity
        run: just api-parity

  # Report-only coverage: never gates the build (continue-on-error) and no
  # other job depends on it. Numbers land in the job log; the lcov file is
  # uploaded as an artifact for anyone who wants to inspect it locally.
  coverage:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov

      - name: Install just
        uses: extractions/setup-just@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Cache cargo
        uses: actions/cache@v6
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-llvm-cov-${{ hashFiles('**/Cargo.lock') }}

      - name: Rust coverage summary
        run: just coverage

      - name: Generate lcov report
        run: just coverage-lcov

      - name: Upload lcov artifact
        uses: actions/upload-artifact@v7
        with:
          name: lcov
          path: lcov.info

      - name: Python coverage summary
        run: just py-coverage
